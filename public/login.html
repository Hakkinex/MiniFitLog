<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 - MiniFitLog</title>
<style>
:root {
  --primary-green: #22C55E;
  --primary-green-dark: #16A34A;
  --primary-green-soft: #DCFCE7;
  --secondary-blue: #0EA5E9;
  --secondary-blue-dark: #0284C7;
  --background: #F8FAFC;
  --card: #FFFFFF;
  --main-text: #0F172A;
  --muted-text: #64748B;
  --border: #E2E8F0;
  --danger-red: #EF4444;
  --shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #FFFFFF; min-height: 100vh; color: var(--main-text); }
.login-stage { min-height: 100vh; width: min(860px, calc(100vw - 32px)); margin: 0 auto; padding: 24px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.login-hero { width: 100%; display: flex; align-items: flex-start; justify-content: center; }
.login-hero img { width: min(820px, 100%); max-height: 420px; object-fit: contain; object-position: top center; }
.login-panel { width: 100%; display: flex; justify-content: center; margin-top: -22px; position: relative; z-index: 1; }
.login-box { background: rgba(255,255,255,.98); padding: 32px; border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow); width: min(420px, calc(100vw - 48px)); }
.login-box h1 { font-size: 20px; margin-bottom: 8px; color: var(--main-text); }
.login-box h1::first-letter { color: var(--primary-green); }
.login-box p { font-size: 13px; line-height: 1.5; color: var(--muted-text); margin-bottom: 20px; }
.login-box label { display: block; font-size: 13px; color: var(--main-text); margin-bottom: 6px; }
.login-box input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; margin-bottom: 14px; color: var(--main-text); background: var(--card); }
.login-box input:focus { outline: 2px solid var(--secondary-blue); outline-offset: 1px; }
.login-box button { width: 100%; padding: 10px; background: var(--primary-green); color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
.login-box button:hover { background: var(--primary-green-dark); }
.login-box button:disabled { opacity: .7; cursor: default; }
.mode-switch { margin-top: 16px; background: transparent !important; color: var(--secondary-blue-dark) !important; border: 1px solid var(--secondary-blue) !important; }
.mode-switch:hover { background: #E0F2FE !important; }
.error { color: var(--danger-red); font-size: 13px; margin-top: 10px; display: none; }
@media (max-width: 860px) {
  body { background: #FFFFFF; }
  .login-stage { width: min(520px, calc(100vw - 24px)); padding: 16px 0; }
  .login-hero img { width: min(560px, 120vw); max-height: 42vh; }
  .login-panel { margin-top: -10px; }
  .login-box { width: 100%; }
}
</style>
</head>
<body>
<div class="login-stage">
  <div class="login-hero" aria-hidden="true">
    <img src="/assets/login-lee-da-hye.png" alt="">
  </div>
  <div class="login-panel">
    <div class="login-box">
      <h1>MiniFitLog</h1>
      <p id="modeHelp">請先註冊使用者，之後即可使用 email 與密碼登入。</p>
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email" placeholder="you@example.com" autofocus>
      <label for="password">密碼</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="至少 8 個字元">
      <button id="submitBtn">註冊並登入</button>
      <button class="mode-switch" id="modeSwitch" type="button">已有帳號，改用登入</button>
      <div class="error" id="errorMsg"></div>
    </div>
  </div>
</div>
<script>
let mode = 'register';

const emailEl = document.getElementById('email');
const passwordEl = document.getElementById('password');
const submitBtn = document.getElementById('submitBtn');
const switchBtn = document.getElementById('modeSwitch');
const helpEl = document.getElementById('modeHelp');
const errorEl = document.getElementById('errorMsg');

function setMode(nextMode) {
  mode = nextMode;
  errorEl.style.display = 'none';
  if (mode === 'login') {
    helpEl.textContent = '使用註冊時的 email 與密碼登入。';
    submitBtn.textContent = '登入';
    switchBtn.textContent = '需要新帳號，改用註冊';
    passwordEl.autocomplete = 'current-password';
  } else {
    helpEl.textContent = '請先註冊使用者，之後即可使用 email 與密碼登入。';
    submitBtn.textContent = '註冊並登入';
    switchBtn.textContent = '已有帳號，改用登入';
    passwordEl.autocomplete = 'new-password';
  }
}

function showError(message) {
  errorEl.textContent = message;
  errorEl.style.display = 'block';
}

async function loadStatus() {
  const res = await fetch('/api/auth/status');
  if (!res.ok) return;
  const status = await res.json();
  if (status.authenticated) {
    window.location.href = '/';
    return;
  }
  setMode(status.hasUsers ? 'login' : 'register');
}

async function submitAuth() {
  const email = emailEl.value.trim();
  const password = passwordEl.value;
  if (!email || !password) {
    showError('請輸入 email 與密碼');
    return;
  }

  submitBtn.disabled = true;
  errorEl.style.display = 'none';
  const endpoint = mode === 'login' ? '/api/auth/login' : '/api/auth/register';
  const res = await fetch(endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  submitBtn.disabled = false;

  if (res.ok) {
    window.location.href = '/';
    return;
  }

  const body = await res.json().catch(() => ({}));
  showError(body.error || '登入失敗');
}

submitBtn.onclick = submitAuth;
switchBtn.onclick = () => setMode(mode === 'login' ? 'register' : 'login');
[emailEl, passwordEl].forEach((el) => {
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitAuth();
  });
});

loadStatus();
</script>
</body>
</html>
