<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniFitLog</title>
<style>
:root {
  --primary-green: #22C55E;
  --primary-green-dark: #16A34A;
  --primary-green-soft: #DCFCE7;
  --secondary-blue: #0EA5E9;
  --secondary-blue-dark: #0284C7;
  --secondary-blue-soft: #E0F2FE;
  --background: #F8FAFC;
  --card: #FFFFFF;
  --main-text: #0F172A;
  --muted-text: #64748B;
  --border: #E2E8F0;
  --warning-orange: #F97316;
  --warning-soft: #FFF7ED;
  --danger-red: #EF4444;
  --danger-soft: #FEF2F2;
  --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
  --shadow-soft: 0 2px 10px rgba(15, 23, 42, 0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--background); color: var(--main-text); font-size: 16pt; }

.layout { display: flex; min-height: 100vh; }

.sidebar { width: 260px; background: var(--card); color: var(--main-text); padding: 16px; flex-shrink: 0; overflow-y: auto; border-right: 1px solid var(--border); box-shadow: var(--shadow-soft); }
.sidebar h2 { font-size: 14pt; margin-bottom: 10px; color: var(--main-text); }
.sidebar .year-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.sidebar .year-nav button { background: var(--background); color: var(--muted-text); border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12pt; }
.sidebar .year-nav button:hover { background: var(--secondary-blue-soft); color: var(--secondary-blue-dark); border-color: var(--secondary-blue); }
.sidebar .year-nav .year-label { font-size: 16pt; font-weight: 700; }
.sidebar .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.sidebar .month-btn { background: var(--background); color: var(--muted-text); border: 1px solid var(--border); padding: 10px 4px; border-radius: 4px; cursor: pointer; font-size: 12pt; text-align: center; }
.sidebar .month-btn:hover { background: var(--primary-green-soft); color: var(--primary-green-dark); border-color: var(--primary-green); }
.sidebar .month-btn.active { background: var(--primary-green); color: white; border-color: var(--primary-green); font-weight: 700; }
.sidebar .logout-btn { margin-top: 20px; width: 100%; background: transparent; border: 1px solid var(--border); color: var(--muted-text); padding: 8px; border-radius: 4px; cursor: pointer; font-size: 11pt; }
.sidebar .logout-btn:hover { background: var(--danger-soft); color: var(--danger-red); border-color: var(--danger-red); }

.sidebar .bmr-settings { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 12px; }
.sidebar .bmr-settings h2 { font-size: 13pt; color: var(--main-text); margin-bottom: 8px; }
.sidebar .bmr-settings .bmr-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 11pt; color: var(--muted-text); }
.sidebar .bmr-settings .bmr-val { flex: 1; background: var(--primary-green-soft); color: var(--primary-green-dark); padding: 4px 8px; border-radius: 4px; font-weight: 700; font-size: 12pt; }
.sidebar .bmr-settings .bmr-edit-btn { background: var(--secondary-blue); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 10pt; }
.sidebar .bmr-settings .bmr-edit-btn:hover { background: var(--secondary-blue-dark); }
.sidebar .bmr-settings .deficit-start-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 10pt; color: var(--muted-text); }
.sidebar .bmr-settings .deficit-start-row input { width: 110px; padding: 3px 6px; border: 1px solid var(--border); border-radius: 4px; background: var(--card); color: var(--main-text); font-size: 10pt; }

.sidebar .food-mgmt { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 12px; }
.sidebar .food-mgmt h2 { font-size: 13pt; color: var(--main-text); margin-bottom: 8px; }
.sidebar .food-mgmt .add-food-btn { width: 100%; background: var(--primary-green); color: white; border: none; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 11pt; margin-bottom: 8px; }
.sidebar .food-mgmt .add-food-btn:hover { background: var(--primary-green-dark); }
.sidebar .food-mgmt .food-list { max-height: 300px; overflow-y: auto; font-size: 10pt; }
.sidebar .food-mgmt .food-group { margin-bottom: 6px; }
.sidebar .food-mgmt .food-group-header { color: var(--secondary-blue-dark); font-weight: 700; font-size: 10pt; margin-bottom: 2px; }
.sidebar .food-mgmt .food-item { display: flex; justify-content: space-between; padding: 2px 4px; color: var(--muted-text); border-radius: 3px; }
.sidebar .food-mgmt .food-item:hover { color: var(--main-text); background: var(--background); }
.sidebar .food-mgmt .food-item .fi-del { color: var(--danger-red); cursor: pointer; margin-left: 4px; }

.main { flex: 1; padding: 16px; overflow-y: auto; }

.tabs { display: flex; gap: 0; margin-bottom: 10px; }
.tab-btn { flex: 1; padding: 10px; border: 1px solid var(--border); background: var(--card); color: var(--muted-text); font-size: 14pt; font-weight: 600; cursor: pointer; border-radius: 6px 6px 0 0; }
.tab-btn:hover { background: var(--primary-green-soft); color: var(--primary-green-dark); }
.tab-btn.active { background: var(--primary-green); color: white; border-color: var(--primary-green); }
.tab-content { display: none; }
.tab-content.active { display: block; }

.header { background: var(--card); color: var(--main-text); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); border-radius: 0 6px 6px 6px; margin-bottom: 10px; box-shadow: var(--shadow-soft); }
.header .nav { display: flex; align-items: center; gap: 10px; }
.header .nav button { background: var(--secondary-blue); color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 14pt; }
.header .nav button:hover { background: var(--secondary-blue-dark); }
.header .nav .month-label { font-size: 18pt; font-weight: 600; min-width: 200px; text-align: center; }

.stats-bar { background: var(--warning-soft); color: var(--main-text); border: 1px solid #FED7AA; padding: 10px 16px; border-radius: 6px; display: flex; gap: 30px; font-size: 14pt; font-weight: 600; box-shadow: var(--shadow-soft); margin-bottom: 10px; flex-wrap: wrap; }

.calendar { }
.week-block { background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; box-shadow: var(--shadow-soft); overflow: hidden; }
.week-header { background: var(--background); padding: 6px 12px; font-size: 12pt; color: var(--muted-text); display: flex; justify-content: space-between; align-items: center; }
.week-header .week-label { font-weight: 600; font-size: 13pt; }
.week-header .week-metrics { display: flex; gap: 12px; font-size: 11pt; align-items: center; flex-wrap: wrap; }
.week-header .week-metrics label { display: flex; align-items: center; gap: 4px; }
.week-header .week-metrics input { width: 70px; padding: 3px 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 11pt; color: var(--main-text); }

.week-header .bmr-fields { display: flex; gap: 10px; font-size: 11pt; align-items: center; flex-wrap: wrap; }
.week-header .bmr-fields label { display: flex; align-items: center; gap: 4px; }
.week-header .bmr-fields input { width: 80px; padding: 3px 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 11pt; color: var(--main-text); }
.week-header .bmr-fields .bmr-edit-btn { background: var(--secondary-blue); color: white; border: none; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 9pt; }
.week-header .bmr-fields .bmr-edit-btn:hover { background: var(--secondary-blue-dark); }
.week-header .deficit-val { font-weight: 700; }
.week-header .deficit-val.positive { color: var(--primary-green); }
.week-header .deficit-val.negative { color: var(--danger-red); }

.day-names-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; background: var(--main-text); border-radius: 6px 6px 0 0; overflow: hidden; margin-bottom: 1px; }
.day-names-row .dn { text-align: center; color: white; font-size: 10pt; padding: 4px 0; font-weight: 600; }

.week-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); }

.day-cell { background: var(--card); font-size: 11pt; }
.day-cell.empty { background: var(--background); }
.day-cell .day-header { background: var(--secondary-blue-soft); padding: 6px 8px; display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid #BAE6FD; }
.day-cell .day-num { font-weight: 700; font-size: 16pt; color: var(--main-text); }
.day-cell .day-name { font-size: 10pt; color: var(--muted-text); font-weight: 600; }
.day-cell .day-body { padding: 6px 6px; min-height: 100px; }

.day-cell .row { margin-bottom: 5px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.day-cell .row label { font-size: 10pt; color: var(--muted-text); min-width: 30px; }
.day-cell select, .day-cell input { font-size: 10pt; padding: 3px 4px; border: 1px solid var(--border); border-radius: 3px; color: var(--main-text); background: var(--card); }
.day-cell select { width: 46px; }
.day-cell .type-select { width: 100px; }
.day-cell input[type="number"] { width: 52px; }
.day-cell .note-input { width: 100%; margin-top: 2px; font-size: 10pt; }
.day-cell .custom-input { width: 70px; }
.day-cell .cardio-label { color: var(--secondary-blue); font-size: 10pt; font-weight: 600; }
.day-cell .plank-label { color: var(--primary-green); font-size: 10pt; font-weight: 600; }

.day-cell.sunday .day-header { background: var(--danger-soft); border-bottom-color: #FECACA; }
.day-cell.saturday .day-header { background: var(--secondary-blue-soft); border-bottom-color: #BAE6FD; }

.meal-section { margin-bottom: 4px; }
.meal-label { font-weight: 700; font-size: 10pt; color: var(--primary-green-dark); margin-bottom: 2px; }
.meal-items { font-size: 9pt; margin-bottom: 2px; }
.meal-item-row { display: flex; justify-content: space-between; align-items: center; padding: 1px 0; }
.meal-item-row .mi-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.meal-item-row .mi-cal { color: var(--muted-text); min-width: 36px; text-align: right; }
.meal-item-row .mi-del { color: var(--danger-red); cursor: pointer; margin-left: 2px; font-size: 9pt; }
.meal-total { font-weight: 700; font-size: 10pt; border-top: 1px solid var(--border); padding-top: 1px; }
.add-food-btn { background: var(--primary-green); color: white; border: none; padding: 2px 6px; border-radius: 3px; cursor: pointer; font-size: 9pt; margin-top: 2px; }
.add-food-btn:hover { background: var(--primary-green-dark); }

.food-dropdown { position: absolute; background: var(--card); border: 1px solid var(--border); border-radius: 6px; box-shadow: var(--shadow); z-index: 100; max-height: 300px; overflow-y: auto; width: 260px; font-size: 10pt; }
.food-dropdown .fd-search { width: 100%; padding: 6px 8px; border: none; border-bottom: 1px solid var(--border); font-size: 10pt; }
.food-dropdown .fd-group { padding: 2px 0; }
.food-dropdown .fd-group-header { padding: 3px 8px; background: var(--background); font-weight: 700; color: var(--muted-text); font-size: 9pt; }
.food-dropdown .fd-item { padding: 4px 8px; cursor: pointer; display: flex; justify-content: space-between; }
.food-dropdown .fd-item:hover { background: var(--primary-green-soft); }
.food-dropdown .fd-item .fd-name { flex: 1; }
.food-dropdown .fd-item .fd-cal { color: var(--muted-text); margin-left: 8px; }
.food-dropdown .fd-custom { padding: 6px 8px; border-top: 1px solid var(--border); }
.food-dropdown .fd-custom input { width: 100%; padding: 3px 4px; border: 1px solid var(--border); border-radius: 3px; font-size: 9pt; margin-bottom: 3px; }
.food-dropdown .fd-custom button { background: var(--primary-green); color: white; border: none; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 9pt; }

.day-total { font-weight: 700; font-size: 10pt; background: var(--warning-soft); color: var(--warning-orange); padding: 2px 4px; border-radius: 3px; text-align: center; margin-top: 4px; }

.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; }
.modal { background: var(--card); padding: 20px; border-radius: 8px; width: 400px; max-width: 90vw; box-shadow: var(--shadow); }
.modal h3 { font-size: 14pt; margin-bottom: 12px; }
.modal label { display: block; font-size: 11pt; margin-bottom: 4px; color: var(--muted-text); }
.modal input, .modal select { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12pt; margin-bottom: 10px; }
.modal .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal .modal-btns button { padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 12pt; }
.modal .btn-save { background: var(--primary-green); color: white; }
.modal .btn-cancel { background: var(--muted-text); color: white; }

.saving-indicator { position: fixed; top: 10px; right: 10px; background: var(--primary-green); color: white; padding: 6px 14px; border-radius: 4px; font-size: 12pt; display: none; z-index: 999; }

@media (max-width: 900px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; min-height: auto; }
  .sidebar .month-grid { grid-template-columns: repeat(6, 1fr); }
}
</style>
</head>
<body>

<div class="saving-indicator" id="saving">儲存中...</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <h2>選擇月份</h2>
    <div class="year-nav">
      <button id="prevYear">&lt;</button>
      <span class="year-label" id="yearLabel"></span>
      <button id="nextYear">&gt;</button>
    </div>
    <div class="month-grid" id="monthGrid"></div>
    <div class="bmr-settings" id="bmrSettings">
      <h2>基礎代謝率</h2>
      <div class="bmr-row">
        <span class="bmr-val" id="bmrDefaultVal">10283</span>
        <button class="bmr-edit-btn" id="bmrEditBtn">修改</button>
      </div>
      <div class="deficit-start-row">
        <label>赤字計算起始日</label>
        <input type="date" id="deficitStartDate">
      </div>
    </div>
    <div class="food-mgmt" id="foodMgmt">
      <h2>食物管理</h2>
      <button class="add-food-btn" id="addFoodBtn">+ 新增食物</button>
      <div class="food-list" id="foodList"></div>
    </div>
    <button class="logout-btn" id="logoutBtn">登出</button>
  </div>

  <div class="main">
    <div class="tabs">
      <button class="tab-btn active" data-tab="training">運動追蹤</button>
      <button class="tab-btn" data-tab="food">飲食追蹤</button>
    </div>
    <div class="header">
      <div class="nav">
        <button id="prevMonth">&lt;</button>
        <span class="month-label" id="monthLabel"></span>
        <button id="nextMonth">&gt;</button>
      </div>
    </div>

    <div id="trainingTab" class="tab-content active">
      <div class="stats-bar">
        <span>有氧達成率: <span id="cardioRate">-</span></span>
        <span>棒式/捲腹達成率: <span id="plankRate">-</span></span>
      </div>
      <div class="calendar" id="trainingCalendar"></div>
    </div>

    <div id="foodTab" class="tab-content">
      <div class="stats-bar" id="foodStatsBar">
        <span>月度累積赤字: <span id="cumulativeDeficit">-</span></span>
      </div>
      <div class="calendar" id="foodCalendar"></div>
    </div>
  </div>
</div>

<div id="modalOverlay" class="modal-overlay" style="display:none;"></div>
<div id="foodDropdown" class="food-dropdown" style="display:none;"></div>

<script>
const EXERCISE_TYPES = ['超慢跑(30mins)','爆裂飛輪','踏步機(30mins)','Tabata 15 mins','爬樓梯(40mins)','渣打半馬','腳踏車','其他'];
const PLANK_TYPES = ['棒式*5(30秒)','捲腹(10次)','深蹲(10次)','提臀(10次)','弓箭步(10次)','上胸(10次)','Workout*2','其他'];
const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DAY_NAMES = ['日','一','二','三','四','五','六'];
const DAY_FULL_NAMES = ['週日','週一','週二','週三','週四','週五','週六'];
const MEAL_NAMES = { breakfast: '早', lunch: '中', dinner: '晚' };
const MEAL_ORDER = ['breakfast','lunch','dinner'];

let currentYear, currentMonth, sidebarYear;
let trainingData = null;
let foodData = null;
let allFoods = [];
let saveTimers = {};
let activeTab = 'training';
let bmrDefault = 10283;
let deficitStartDate = '';

function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  sidebarYear = currentYear;

  document.getElementById('prevMonth').onclick = () => { changeMonth(-1); };
  document.getElementById('nextMonth').onclick = () => { changeMonth(1); };
  document.getElementById('prevYear').onclick = () => { sidebarYear--; renderSidebar(); };
  document.getElementById('nextYear').onclick = () => { sidebarYear++; renderSidebar(); };
  document.getElementById('logoutBtn').onclick = logout;
  document.getElementById('addFoodBtn').onclick = showAddFoodModal;
  document.getElementById('bmrEditBtn').onclick = showBmrEditModal;
  document.getElementById('deficitStartDate').onchange = saveDeficitStartDate;

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      activeTab = btn.dataset.tab;
      document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
    };
  });

  renderSidebar();
  loadAllFoods();
  loadSettings();
  loadMonth();
}

function renderSidebar() {
  document.getElementById('yearLabel').textContent = `${sidebarYear}`;
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = '';
  for (let m = 1; m <= 12; m++) {
    const btn = document.createElement('button');
    btn.className = 'month-btn';
    if (sidebarYear === currentYear && m === currentMonth) btn.classList.add('active');
    btn.textContent = MONTH_NAMES[m - 1];
    btn.onclick = () => {
      currentYear = sidebarYear;
      currentMonth = m;
      renderSidebar();
      loadMonth();
    };
    grid.appendChild(btn);
  }
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  sidebarYear = currentYear;
  renderSidebar();
  loadMonth();
}

async function loadAllFoods() {
  try {
    const res = await fetch('/api/foods');
    if (res.ok) allFoods = await res.json();
  } catch(e) { allFoods = []; }
  renderFoodList();
}

async function loadSettings() {
  try {
    const res = await fetch('/api/settings');
    if (res.ok) {
      const settings = await res.json();
      settings.forEach(function(s) {
        if (s.key === 'bmr_default' && s.value) {
          bmrDefault = parseFloat(s.value);
          document.getElementById('bmrDefaultVal').textContent = bmrDefault;
        }
        if (s.key === 'deficit_start_date' && s.value) {
          deficitStartDate = s.value;
        }
      });
    }
  } catch(e) {}
  if (!deficitStartDate) {
    deficitStartDate = currentYear + '-01-01';
  }
  document.getElementById('deficitStartDate').value = deficitStartDate;
}

function renderFoodList() {
  const list = document.getElementById('foodList');
  list.innerHTML = '';
  const groups = {};
  allFoods.forEach(f => {
    if (!groups[f.source]) groups[f.source] = [];
    groups[f.source].push(f);
  });
  for (const [src, items] of Object.entries(groups)) {
    const g = document.createElement('div');
    g.className = 'food-group';
    g.innerHTML = `<div class="food-group-header">${src}</div>`;
    items.forEach(f => {
      const row = document.createElement('div');
      row.className = 'food-item';
      row.innerHTML = `<span>${f.name} (${f.calories})</span><span class="fi-del" data-fid="${f.id}">&times;</span>`;
      g.appendChild(row);
    });
    list.appendChild(g);
  }
  list.querySelectorAll('.fi-del').forEach(el => {
    el.onclick = async () => {
      await fetch(`/api/foods/${el.dataset.fid}`, { method: 'DELETE' });
      await loadAllFoods();
      loadMonth();
    };
  });
}

async function loadMonth() {
  document.getElementById('monthLabel').textContent = `${currentYear} 年 ${currentMonth} 月`;
  try {
    const res1 = await fetch(`/api/months/${currentYear}/${currentMonth}`);
    trainingData = res1.ok ? await res1.json() : { weeklyMetrics: [], dailyRecords: [], stats: { cardioRate: 0, plankRate: 0, cardioDone: 0, cardioTotal: 0, plankDone: 0, plankTotal: 0 } };
  } catch(e) {
    trainingData = { weeklyMetrics: [], dailyRecords: [], stats: { cardioRate: 0, plankRate: 0, cardioDone: 0, cardioTotal: 0, plankDone: 0, plankTotal: 0 } };
  }
  try {
    const res2 = await fetch(`/api/food/months/${currentYear}/${currentMonth}`);
    foodData = res2.ok ? await res2.json() : { daily: [], bmrRecords: [], foodItems: [] };
  } catch(e) {
    foodData = { daily: [], bmrRecords: [], foodItems: [] };
  }
  renderTrainingStats();
  renderTrainingCalendar();
  renderFoodStats();
  renderFoodCalendar();
}

function getDaysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function getFirstDayOfWeek(y, m) { return new Date(y, m - 1, 1).getDay(); }

function getWeekNumber(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const startOfYear = new Date(d.getFullYear(), 0, 1);
  const dayOfYear = Math.floor((d.getTime() - startOfYear.getTime()) / 86400000) + 1;
  const jan1Day = startOfYear.getDay();
  const firstSunday = jan1Day === 0 ? 1 : 8 - jan1Day;
  if (dayOfYear < firstSunday) return 1;
  return Math.ceil((dayOfYear - firstSunday + 1) / 7) + 1;
}

function formatDate(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function debounceSave(key, fn, ms) {
  if (saveTimers[key]) clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(fn, ms);
}

function showSaving() { document.getElementById('saving').style.display = 'block'; }

function renderTrainingCalendar() {

  cal.innerHTML = '';
  const daysInMonth = getDaysInMonth(currentYear, currentMonth);
  const firstDay = getFirstDayOfWeek(currentYear, currentMonth);

  (trainingData.dailyRecords || []).forEach(r => { recordsMap[r.date] = r; });
  const metricsMap = {};

function appendDayNamesRow(container) {
  const row = document.createElement('div');
  row.className = 'day-names-row';
  for (let i = 0; i < 7; i++) {
    const dn = document.createElement('div');
    dn.className = 'dn';
    dn.textContent = DAY_FULL_NAMES[i];
    row.appendChild(dn);
  }
  container.appendChild(row);
}

function buildWeekBlock(dayNum, daysInMonth, firstDay, recordsMap, metricsMap, mode) {
  const week = document.createElement('div');
  week.className = 'week-block';
  const weekStartDay = dayNum;
  const weekStartDate = formatDate(currentYear, currentMonth, weekStartDay);
  const weekNum = getWeekNumber(weekStartDate);
  const satDate = getSaturdayDate(weekStartDate, daysInMonth);

  const header = document.createElement('div');
  header.className = 'week-header';

  const weekLabel = document.createElement('span');
  weekLabel.className = 'week-label';
  weekLabel.textContent = `W${weekNum}`;

  if (mode === 'training') {
    const metricsDiv = document.createElement('span');
    metricsDiv.className = 'week-metrics';
    const wm = metricsMap[satDate] || null;
    metricsDiv.innerHTML = buildWeeklyInputsHTML(satDate, wm);
    header.appendChild(weekLabel);
    header.appendChild(metricsDiv);
  } else {
    const bmrDiv = document.createElement('span');
    bmrDiv.className = 'bmr-fields';
    const bmrRec = (foodData.bmrRecords || []).find(b => b.date === satDate);
    const bmrVal = bmrRec ? bmrRec.bmr : bmrDefault;
    let weekIntake = 0;
    for (let d = 0; d < 7 && (weekStartDay + d) <= daysInMonth; d++) {
      const dd = formatDate(currentYear, currentMonth, weekStartDay + d);
      const fd = (foodData.daily || []).find(x => x.date === dd);
      if (fd) weekIntake += fd.totalCal;
    }
    const deficit = (bmrVal - weekIntake).toFixed(1);
    const defClass = parseFloat(deficit) >= 0 ? 'positive' : 'negative';
    bmrDiv.innerHTML = `<label>基礎代謝率<input type="number" value="${bmrVal}" data-bmr-date="${satDate}" data-bmr-field="bmr"></label>` +
      `<span>攝取: ${weekIntake.toFixed(0)}</span>` +
      `<span>赤字: <span class="deficit-val ${defClass}">${deficit}</span></span>` +
      `<button class="bmr-edit-btn" data-bmr-cascade="${satDate}" style="font-size:9pt;padding:2px 6px;">往後套用</button>`;
    header.appendChild(weekLabel);
    header.appendChild(bmrDiv);
  }

  week.appendChild(header);
  const days = document.createElement('div');
  days.className = 'week-days';
  const startOffset = (dayNum === 1) ? firstDay : 0;
  let nextDay = dayNum;

  for (let d = 0; d < 7; d++) {
    if (d < startOffset || nextDay > daysInMonth) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      days.appendChild(empty);
      continue;
    }
    const date = formatDate(currentYear, currentMonth, nextDay);
    const dow = new Date(date + 'T00:00:00').getDay();
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (dow === 0) cell.classList.add('sunday');
    if (dow === 6) cell.classList.add('saturday');

    if (mode === 'training') {
      const rec = recordsMap[date] || {};
      cell.innerHTML = buildTrainingDayHTML(nextDay, date, dow, rec);
    } else {
      const fd = (foodData.daily || []).find(x => x.date === date);
      cell.innerHTML = buildFoodDayHTML(nextDay, date, dow, fd);
    }
    days.appendChild(cell);
    nextDay++;
  }
  week.appendChild(days);
  return { week, nextDay };
}

function getSaturdayDate(weekStartDate, daysInMonth) {
  const parts = weekStartDate.split('-');
  const y = parseInt(parts[0]), m = parseInt(parts[1]), d = parseInt(parts[2]);
  const satDay = d + 6;
  return satDay <= daysInMonth ? formatDate(y, m, satDay) : formatDate(y, m, daysInMonth);
}

function buildWeeklyInputsHTML(date, wm) {
  const bf = wm ? (wm.body_fat || '') : '';
  const wt = wm ? (wm.weight || '') : '';
  const ws = wm ? (wm.waist || '') : '';
  return `<label>體脂肪%<input type="number" step="0.1" value="${bf}" data-wm-date="${date}" data-wm-field="body_fat"></label>` +
    `<label>體重kg<input type="number" step="0.1" value="${wt}" data-wm-date="${date}" data-wm-field="weight"></label>` +
    `<label>腰圍cm<input type="number" step="0.1" value="${ws}" data-wm-date="${date}" data-wm-field="waist"></label>`;
}

function buildTrainingDayHTML(dayNum, date, dow, rec) {
  const cd = rec.cardio_done === 1 ? 'Y' : (rec.cardio_done === 0 && rec.note ? 'N' : '');
  const pd = rec.plank_done === 1 ? 'Y' : (rec.plank_done === 0 && rec.note ? 'N' : '');
  const et = rec.exercise_type || '';
  const pt = rec.plank_type || '';
  const ch = rec.cardio_heartbeat || '';
  const ph = rec.plank_heartbeat || '';
  const note = rec.note || '';
  const ec = rec.exercise_custom || '';
  const pc = rec.plank_custom || '';

  let html = `<div class="day-header"><span class="day-num">${dayNum}</span><span class="day-name">${DAY_NAMES[dow]}</span></div><div class="day-body">`;
  html += `<div class="row"><span class="cardio-label">有氧</span>`;
  html += `<select data-date="${date}" data-field="cardio_done"><option value=""></option><option value="1" ${cd==='Y'?'selected':''}>Y</option><option value="0" ${cd==='N'?'selected':''}>N</option></select>`;
  html += `<select class="type-select" data-date="${date}" data-field="exercise_type">${buildOptions(EXERCISE_TYPES, et)}</select>`;
  if (et === '其他') html += `<input class="custom-input" data-date="${date}" data-field="exercise_custom" value="${ec}" placeholder="自訂">`;
  html += `</div>`;
  html += `<div class="row"><label>心跳</label><input type="number" data-date="${date}" data-field="cardio_heartbeat" value="${ch}" min="0" max="300"></div>`;
  html += `<div class="row"><span class="plank-label">捲腹</span>`;
  html += `<select data-date="${date}" data-field="plank_done"><option value=""></option><option value="1" ${pd==='Y'?'selected':''}>Y</option><option value="0" ${pd==='N'?'selected':''}>N</option></select>`;
  html += `<select class="type-select" data-date="${date}" data-field="plank_type">${buildOptions(PLANK_TYPES, pt)}</select>`;
  if (pt === '其他') html += `<input class="custom-input" data-date="${date}" data-field="plank_custom" value="${pc}" placeholder="自訂">`;
  html += `</div>`;
  html += `<div class="row"><label>心跳</label><input type="number" data-date="${date}" data-field="plank_heartbeat" value="${ph}" min="0" max="300"></div>`;
  html += `<input class="note-input" data-date="${date}" data-field="note" value="${note}" placeholder="備註">`;
  html += `</div>`;
  return html;
}

function buildOptions(types, selected) {
  let opts = '<option value=""></option>';
  types.forEach(t => { opts += `<option value="${t}" ${t===selected?'selected':''}>${t}</option>`; });
  return opts;
}

    else body[field] = val || null;
  });

    cumDefEl.textContent = result.deficit.toFixed(1) + ' kcal';
    cumDefEl.className = result.deficit >= 0 ? 'positive' : 'negative';
  });
}

async function calculateCumulativeDeficit() {
  var startDate = deficitStartDate || (currentYear + '-01-01');
  var totalBmr = 0;
  var totalIntake = 0;
  var startParts = startDate.split('-');
  var startYear = parseInt(startParts[0]);
  var startMonth = parseInt(startParts[1]);
  var endYear = currentYear;
  var endMonth = currentMonth;
  var y = startYear;
  var m = startMonth;
  while (y < endYear || (y === endYear && m <= endMonth)) {
    try {
      var res = await fetch('/api/food/months/' + y + '/' + m);
      if (res.ok) {
        var data = await res.json();
        var bmrRecs = data.bmrRecords || [];
        bmrRecs.forEach(function(b) { totalBmr += (b.bmr || 0); });
        var daily = data.daily || [];
        daily.forEach(function(d) { totalIntake += (d.totalCal || 0); });
      }
    } catch(e) {}
    m++;
    if (m > 12) { m = 1; y++; }
  }
  return { deficit: totalBmr - totalIntake, totalBmr: totalBmr, totalIntake: totalIntake };
}

function buildFoodDayHTML(dayNum, date, dow, fd) {
  const meals = fd ? (fd.meals || { breakfast: [], lunch: [], dinner: [] }) : { breakfast: [], lunch: [], dinner: [] };
  const bc = fd ? (fd.breakfastCal || 0) : 0;
  const lc = fd ? (fd.lunchCal || 0) : 0;
  const dc = fd ? (fd.dinnerCal || 0) : 0;
  const total = fd ? (fd.totalCal || 0) : 0;

  let html = `<div class="day-header"><span class="day-num">${dayNum}</span><span class="day-name">${DAY_NAMES[dow]}</span></div><div class="day-body">`;

  for (const mt of MEAL_ORDER) {
    const items = meals[mt] || [];
    html += `<div class="meal-section">`;
    html += `<div class="meal-label">${MEAL_NAMES[mt]}</div>`;
    html += `<div class="meal-items" data-meal-date="${date}" data-meal-type="${mt}">`;
    items.forEach(function(item, idx) {
      const name = (item.food && item.food.name) || item.custom_name || '?';
      const cal = (item.food && item.food.calories) || item.custom_calories || 0;
      html += `<div class="meal-item-row"><span class="mi-name">${name}</span><span class="mi-cal">${cal}</span><span class="mi-del" data-mi-date="${date}" data-mi-meal="${mt}" data-mi-idx="${idx}">&times;</span></div>`;
    });
    html += `</div>`;
    const mealCal = mt === 'breakfast' ? bc : mt === 'lunch' ? lc : dc;
    html += `<div class="meal-total">${mealCal} kcal</div>`;
    html += `<button class="add-food-btn" data-af-date="${date}" data-af-meal="${mt}">+食物</button>`;
    html += `</div>`;
  }

  html += `<div class="day-total">合計: ${total} kcal</div>`;
  html += `</div>`;
  return html;
}

function showFoodDropdown(btn, date, meal) {
  const dd = document.getElementById('foodDropdown');
  const rect = btn.getBoundingClientRect();
  dd.style.left = rect.left + 'px';
  dd.style.top = (rect.bottom + 4) + 'px';
  dd.style.display = 'block';

  let html = `<input class="fd-search" placeholder="搜尋食物..." autofocus>`;
  const groups = {};
  allFoods.forEach(function(f) { if (!groups[f.source]) groups[f.source] = []; groups[f.source].push(f); });
  for (const [src, items] of Object.entries(groups)) {
    html += `<div class="fd-group"><div class="fd-group-header">${src}</div>`;
    items.forEach(f => {
      html += `<div class="fd-item" data-fi-id="${f.id}" data-fi-cal="${f.calories}"><span class="fd-name">${f.name}</span><span class="fd-cal">${f.calories} kcal</span></div>`;
    });
    html += `</div>`;
  }
  html += `<div class="fd-custom"><input placeholder="自訂: 來源" id="fdCustomSrc"><input placeholder="自訂: 名稱" id="fdCustomName"><input placeholder="自訂: 熱量" id="fdCustomCal" type="number"><button id="fdCustomSave">新增並加入</button></div>`;

  dd.innerHTML = html;

  dd.querySelectorAll('.fd-item').forEach(item => {
    item.onclick = async () => {
      const foodId = parseInt(item.dataset.fiId);
      await addMealItem(date, meal, { food_item_id: foodId });
      dd.style.display = 'none';
    };
  });

  dd.querySelector('#fdCustomSave').onclick = async () => {
    const src = dd.querySelector('#fdCustomSrc').value.trim();
    const name = dd.querySelector('#fdCustomName').value.trim();
    const cal = parseFloat(dd.querySelector('#fdCustomCal').value);
    if (!name || !cal) return;
    const res = await fetch('/api/foods', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ source: src || '自訂', name, calories: cal }) });
    if (res.ok) {
      const newFood = await res.json();
      await loadAllFoods();
      await addMealItem(date, meal, { food_item_id: newFood.id });
    }
    dd.style.display = 'none';
  };

  const searchInput = dd.querySelector('.fd-search');
  searchInput.oninput = () => {
    const q = searchInput.value.toLowerCase();
    dd.querySelectorAll('.fd-item').forEach(item => {
      const name = item.querySelector('.fd-name').textContent.toLowerCase();
      item.style.display = name.includes(q) ? '' : 'none';
    });
  };

  const closeDd = function(e) {
    if (!dd.contains(e.target)) { dd.style.display = 'none'; document.removeEventListener('click', closeDd); }
  };
  setTimeout(() => document.addEventListener('click', closeDd), 10);
}

async function addMealItem(date, meal, item) {
  const fd = (foodData.daily || []).find(function(x) { return x.date === date; });
  const meals = fd ? (fd.meals || { breakfast: [], lunch: [], dinner: [] }) : { breakfast: [], lunch: [], dinner: [] };
  const existing = meals[meal] || [];
  const items = existing.map(function(i, idx) {
    return {
      food_item_id: i.food_item_id || null,
      custom_name: i.custom_name || null,
      custom_calories: i.custom_calories || null,
      sort_order: idx,
    };
  });
  items.push({ ...item, sort_order: items.length });
  showSaving();
  await fetch(`/api/food/daily/${date}/${meal}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items }) });
  hideSaving();
  loadMonth();
}

async function removeMealItem(date, meal, idx) {
  const fd = (foodData.daily || []).find(function(x) { return x.date === date; });
  const meals = fd ? (fd.meals || { breakfast: [], lunch: [], dinner: [] }) : { breakfast: [], lunch: [], dinner: [] };
  const existing = meals[meal] || [];
  existing.splice(idx, 1);
  const items = existing.map(function(i, iIdx) {
    return {
      food_item_id: i.food_item_id || null,
      custom_name: i.custom_name || null,
      custom_calories: i.custom_calories || null,
      sort_order: iIdx,
    };
  });
  showSaving();
  await fetch(`/api/food/daily/${date}/${meal}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items }) });
  hideSaving();
  loadMonth();
}

    overlay.style.display = 'none';
    await loadAllFoods();
  };
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.reload();
}

init();
</script>
